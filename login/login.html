<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vital Stream Login</title>
  <link rel="stylesheet" href="lodin.css">
</head>
<body>

<div class="container">
  <div class="login-card">
    
    <div class="logo">🩸</div>
    <h1>Vital Stream</h1>
    <h2>Admin Login</h2>
    <p class="subtitle">Secure access for hospital and blood bank administrators.</p>

    <form id="loginForm">
      <input type="email" id="email" placeholder="Email Address" required>
      <p class="error" id="emailError"></p>

      <div class="password-box">
        <input type="password" id="password" placeholder="Password" required>
        <span class="eye" id="togglePassword">👁</span>
      </div>
      <p class="error" id="passwordError"></p>

      <div class="options">
        <label>
          <input type="checkbox" id="rememberMe"> Remember me
        </label>
        <a href="#">Forgot Password?</a>
      </div>

      <p class="error" id="formError"></p>
      <button type="submit" id="loginBtn">Log In →</button>
    </form>

    <p class="support">Need technical support? <span>Contact IT.</span></p>

  </div>

  <script src="login.js"></script>
</body>
</html>
